name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release tag: $tag"
            exit 1
          fi
          version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$version" ]]; then
            echo "Tag version $version does not match package.json version $package_version."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release-notes:
    name: Publish release notes
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit release notes
        run: node scripts/release-notes.mjs "${{ needs.preflight.outputs.tag }}" > release-notes.md

      - name: Publish Release Drafter notes
        uses: release-drafter/release-drafter@v7
        with:
          publish: true
          tag: ${{ needs.preflight.outputs.tag }}
          name: DB Connect ${{ needs.preflight.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Override release notes with commit changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "DB Connect $RELEASE_TAG" \
            --notes-file release-notes.md

  publish:
    name: Build and publish (${{ matrix.platform }})
    needs: [preflight, release-notes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rustTargets: ""
          - platform: windows-latest
            args: ""
            rustTargets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri / WebKitGTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-release-${{ matrix.platform }}-${{ matrix.args }}

      - name: Publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GITHUB_ISSUE_REPO: ${{ vars.VITE_GITHUB_ISSUE_REPO }}
        with:
          tagName: ${{ needs.preflight.outputs.tag }}
          releaseName: DB Connect v__VERSION__
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: false
          args: ${{ matrix.args }}
